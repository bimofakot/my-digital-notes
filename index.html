<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Digital Bimo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My Digital Notes</h1>
        <div class="input-section">
            <input type="text" id="noteTitle" placeholder="Judul Catatan (cth: Konfigurasi CachyOS)">
            <textarea id="noteContent" rows="4" placeholder="Tulis ringkasan di sini..."></textarea>
            <button id="saveBtn">Simpan Catatan</button>
        </div>
        <hr>
        <div id="notesList">
            <p style="text-align: center;">Memuat catatan...</p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
